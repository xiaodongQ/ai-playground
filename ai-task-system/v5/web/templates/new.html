<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新建任务 - AI Task System</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <span class="icon">🤖</span>
      <span>AI Task System</span>
    </a>
    <div class="navbar-links">
      <a href="/">任务列表</a>
      <a href="/new" class="active">新建任务</a>
    </div>
  </nav>

  <!-- 主容器 -->
  <div class="container">
    <!-- 页面头部 -->
    <div class="page-header">
      <h1 class="page-title">新建任务</h1>
    </div>

    <!-- 表单 -->
    <div class="form-card">
      <form id="task-form">
        <!-- 任务描述 -->
        <div class="form-group">
          <label for="prompt">任务描述 *</label>
          <textarea 
            id="prompt" 
            name="prompt" 
            placeholder="描述你想要完成的任务，例如：帮我写一个 Python 函数计算斐波那契数列"
            required
          ></textarea>
          <div class="hint">清晰地描述任务需求，越具体越好</div>
        </div>

        <!-- Agent 选择 -->
        <div class="form-group">
          <label for="agent">Agent</label>
          <select id="agent" name="agent">
            <option value="">自动选择（推荐）</option>
            <option value="claude">Claude Code</option>
            <option value="codex">Codex</option>
            <option value="codebuddy">CodeBuddy</option>
          </select>
          <div class="hint">自动选择会根据任务类型选择最合适的 Agent</div>
        </div>

        <!-- 权限模式 -->
        <div class="form-group">
          <label for="permission-mode">权限模式</label>
          <select id="permission-mode" name="permission_mode">
            <option value="auto">自动（Auto）</option>
            <option value="bypass">跳过确认（Bypass）</option>
            <option value="plan">仅规划（Plan）</option>
          </select>
          <div class="hint">Bypass 模式会跳过所有确认提示，适合自动化场景</div>
        </div>

        <!-- 超时时间 -->
        <div class="form-group">
          <label for="timeout">超时时间（秒）</label>
          <input 
            type="number" 
            id="timeout" 
            name="timeout" 
            value="300" 
            min="30" 
            max="3600"
          >
          <div class="hint">任务最大执行时间，默认 300 秒</div>
        </div>

        <!-- 优先级 -->
        <div class="form-group">
          <label for="priority">优先级</label>
          <select id="priority" name="priority">
            <option value="normal">普通（Normal）</option>
            <option value="high">高（High）</option>
            <option value="low">低（Low）</option>
            <option value="critical">紧急（Critical）</option>
          </select>
        </div>

        <!-- 操作按钮 -->
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submit-btn">
            🚀 创建并执行
          </button>
          <a href="/" class="btn btn-secondary">取消</a>
        </div>
      </form>

      <!-- 结果区域 -->
      <div id="result" style="margin-top: 1.5rem; display: none;">
        <div class="task-info-grid" id="result-info"></div>
        <div style="margin-top: 1rem;">
          <a href="/" class="btn btn-secondary" style="margin-right: 0.5rem;">返回列表</a>
          <a href="#" class="btn btn-primary" id="view-task-btn">查看任务 →</a>
        </div>
      </div>
    </div>

    <!-- 路由预览 -->
    <div class="form-card" style="margin-top: 1.5rem;">
      <h3 style="margin-bottom: 1rem;">💡 路由预览</h3>
      <div id="route-preview">
        <p style="color: var(--text-secondary);">输入任务描述后自动分析...</p>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
  <script>
    const form = document.getElementById('task-form');
    const promptInput = document.getElementById('prompt');
    const routePreview = document.getElementById('route-preview');
    const resultDiv = document.getElementById('result');
    const submitBtn = document.getElementById('submit-btn');

    let routeTimeout = null;

    // 路由预览更新
    async function updateRoutePreview(prompt) {
      if (!prompt.trim()) {
        routePreview.innerHTML = '<p style="color: var(--text-secondary);">输入任务描述后自动分析...</p>';
        return;
      }

      routePreview.innerHTML = '<p style="color: var(--text-secondary);">分析中...</p>';

      try {
        const route = await api.route(prompt);
        const agentLabels = {
          'claude': 'Claude Code',
          'codex': 'Codex',
          'codebuddy': 'CodeBuddy'
        };
        
        routePreview.innerHTML = `
          <div style="display: grid; gap: 0.5rem;">
            <div><strong>任务类型:</strong> ${route.task_type || '-'}</div>
            <div><strong>推荐 Agent:</strong> ${agentLabels[route.agent] || route.agent || '自动'}</div>
            <div><strong>置信度:</strong> ${route.confidence ? (route.confidence * 100).toFixed(0) + '%' : '-'}</div>
          </div>
        `;

        // 如果用户没有手动选择 Agent，自动选中推荐的
        if (!document.getElementById('agent').value && route.agent) {
          document.getElementById('agent').value = route.agent;
        }
      } catch (err) {
        console.error('Route preview failed:', err);
        routePreview.innerHTML = '<p style="color: var(--text-secondary);">路由分析不可用</p>';
      }
    }

    // 输入时更新路由预览（防抖）
    promptInput.addEventListener('input', () => {
      if (routeTimeout) clearTimeout(routeTimeout);
      routeTimeout = setTimeout(() => {
        updateRoutePreview(promptInput.value);
      }, 500);
    });

    // 表单提交
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = {
        prompt: promptInput.value.trim(),
        agent: document.getElementById('agent').value || undefined,
        permission_mode: document.getElementById('permission-mode').value,
        timeout: parseInt(document.getElementById('timeout').value),
        priority: document.getElementById('priority').value
      };

      // 验证
      if (!formData.prompt) {
        alert('请输入任务描述');
        return;
      }

      // 显示加载状态
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<div class="spinner" style="width: 16px; height: 16px; border-width: 2px;"></div> 创建中...';

      try {
        const result = await api.createTask(formData);
        
        // 显示结果
        resultDiv.style.display = 'block';
        document.getElementById('result-info').innerHTML = `
          <div class="task-info-item">
            <div class="info-label">任务 ID</div>
            <div class="info-value">${result.task_id || result.id || '-'}</div>
          </div>
          <div class="task-info-item">
            <div class="info-label">状态</div>
            <div class="info-value">${formatStatus(result.status || 'pending').text}</div>
          </div>
          <div class="task-info-item">
            <div class="info-label">Agent</div>
            <div class="info-value">${result.agent || formData.agent || 'auto'}</div>
          </div>
        `;

        document.getElementById('view-task-btn').href = `/task/${result.task_id || result.id}`;
        
        // 隐藏表单
        form.style.display = 'none';

      } catch (err) {
        console.error('Create task failed:', err);
        alert(`创建任务失败: ${err.message}`);
        submitBtn.disabled = false;
        submitBtn.innerHTML = '🚀 创建并执行';
      }
    });
  </script>
</body>
</html>
